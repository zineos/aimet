<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AIMET 数据流可视化</title>
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 20px;
            background: radial-gradient(ellipse at center, #1e3c72 0%, #2a5298 100%);
            color: white;
        }
        
        .visualization-container {
            background: rgba(255, 255, 255, 0.95);
            margin: 20px 0;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.1);
            backdrop-filter: blur(10px);
        }
        
        .viz-title {
            font-size: 28px;
            font-weight: bold;
            color: #2c3e50;
            margin-bottom: 30px;
            text-align: center;
            position: relative;
        }
        
        .viz-title::after {
            content: '';
            position: absolute;
            bottom: -10px;
            left: 50%;
            transform: translateX(-50%);
            width: 120px;
            height: 4px;
            background: linear-gradient(90deg, #667eea, #764ba2);
            border-radius: 2px;
        }
        
        .data-node {
            cursor: pointer;
            transition: all 0.3s ease;
        }
        
        .data-node:hover {
            transform: scale(1.1);
            filter: brightness(1.2);
        }
        
        .input-node { fill: #e74c3c; stroke: #c0392b; }
        .process-node { fill: #3498db; stroke: #2980b9; }
        .output-node { fill: #2ecc71; stroke: #27ae60; }
        .storage-node { fill: #f39c12; stroke: #e67e22; }
        .control-node { fill: #9b59b6; stroke: #8e44ad; }
        
        .data-flow {
            fill: none;
            stroke-width: 3;
            marker-end: url(#arrowhead);
        }
        
        .primary-flow { stroke: #e74c3c; }
        .secondary-flow { stroke: #3498db; }
        .control-flow { stroke: #9b59b6; stroke-dasharray: 5,5; }
        
        .flow-label {
            font-size: 10px;
            fill: #2c3e50;
            text-anchor: middle;
            font-weight: 600;
        }
        
        .node-label {
            font-size: 12px;
            font-weight: bold;
            fill: white;
            text-anchor: middle;
            dominant-baseline: middle;
        }
        
        .tooltip {
            position: absolute;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 15px;
            border-radius: 10px;
            font-size: 12px;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.3s;
            box-shadow: 0 8px 25px rgba(0,0,0,0.2);
            max-width: 300px;
            z-index: 1000;
        }
        
        .legend-container {
            background: #ecf0f1;
            padding: 20px;
            border-radius: 15px;
            margin-top: 20px;
            color: #2c3e50;
        }
        
        .legend-title {
            font-size: 18px;
            font-weight: bold;
            margin-bottom: 15px;
            color: #2c3e50;
        }
        
        .legend-item {
            display: inline-block;
            margin: 8px 20px;
            font-size: 14px;
        }
        
        .legend-circle {
            display: inline-block;
            width: 20px;
            height: 20px;
            border-radius: 50%;
            margin-right: 8px;
            vertical-align: middle;
            border: 2px solid rgba(0,0,0,0.2);
        }
        
        .animated-flow {
            animation: flowAnimation 2s infinite;
        }
        
        @keyframes flowAnimation {
            0% { stroke-dashoffset: 0; }
            100% { stroke-dashoffset: -20; }
        }
        
        .control-panel {
            position: fixed;
            top: 20px;
            right: 20px;
            background: rgba(0,0,0,0.8);
            padding: 20px;
            border-radius: 15px;
            color: white;
            z-index: 100;
        }
        
        .control-button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 10px 20px;
            margin: 5px;
            border-radius: 25px;
            cursor: pointer;
            transition: all 0.3s;
            font-weight: bold;
        }
        
        .control-button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }
    </style>
</head>
<body>
    <h1 style="text-align: center; margin-bottom: 40px; font-size: 36px; text-shadow: 2px 2px 4px rgba(0,0,0,0.3);">
        🌊 AIMET 数据流可视化
    </h1>

    <div class="control-panel">
        <h4 style="margin-top: 0; color: #3498db;">🎮 控制面板</h4>
        <button class="control-button" onclick="animateDataFlow()">▶️ 播放数据流</button>
        <button class="control-button" onclick="highlightCriticalPath()">🎯 关键路径</button>
        <button class="control-button" onclick="showStatistics()">📊 统计信息</button>
        <button class="control-button" onclick="resetVisualization()">🔄 重置视图</button>
    </div>

    <!-- 量化数据流图 -->
    <div class="visualization-container">
        <div class="viz-title">📊 量化过程数据流</div>
        <svg id="quantization-dataflow" width="1200" height="700"></svg>
        <div class="legend-container">
            <div class="legend-title">🏷️ 图例说明</div>
            <div class="legend-item">
                <span class="legend-circle" style="background: #e74c3c;"></span>输入数据
            </div>
            <div class="legend-item">
                <span class="legend-circle" style="background: #3498db;"></span>处理过程
            </div>
            <div class="legend-item">
                <span class="legend-circle" style="background: #2ecc71;"></span>输出结果
            </div>
            <div class="legend-item">
                <span class="legend-circle" style="background: #f39c12;"></span>存储缓存
            </div>
            <div class="legend-item">
                <span class="legend-circle" style="background: #9b59b6;"></span>控制信号
            </div>
        </div>
    </div>

    <!-- 编码计算数据流图 -->
    <div class="visualization-container">
        <div class="viz-title">🧮 编码计算数据流</div>
        <svg id="encoding-dataflow" width="1000" height="600"></svg>
    </div>

    <!-- 模块间数据传递图 -->
    <div class="visualization-container">
        <div class="viz-title">🔄 模块间数据传递</div>
        <svg id="module-dataflow" width="1100" height="650"></svg>
    </div>

    <div class="tooltip" id="tooltip"></div>

    <script>
        // 工具函数
        function createArrowMarkers(svg) {
            const defs = svg.append("defs");
            
            // 标准箭头
            defs.append("marker")
                .attr("id", "arrowhead")
                .attr("viewBox", "0 -5 10 10")
                .attr("refX", 8)
                .attr("refY", 0)
                .attr("markerWidth", 8)
                .attr("markerHeight", 8)
                .attr("orient", "auto")
                .append("path")
                .attr("d", "M0,-5L10,0L0,5")
                .attr("fill", "#34495e");

            // 渐变定义
            const gradients = [
                {id: "primaryGradient", colors: ["#e74c3c", "#c0392b"]},
                {id: "secondaryGradient", colors: ["#3498db", "#2980b9"]},
                {id: "successGradient", colors: ["#2ecc71", "#27ae60"]},
                {id: "warningGradient", colors: ["#f39c12", "#e67e22"]},
                {id: "infoGradient", colors: ["#9b59b6", "#8e44ad"]}
            ];

            gradients.forEach(grad => {
                const gradient = defs.append("linearGradient")
                    .attr("id", grad.id)
                    .attr("x1", "0%").attr("y1", "0%")
                    .attr("x2", "100%").attr("y2", "100%");
                
                gradient.append("stop")
                    .attr("offset", "0%")
                    .attr("stop-color", grad.colors[0]);
                
                gradient.append("stop")
                    .attr("offset", "100%")
                    .attr("stop-color", grad.colors[1]);
            });
        }

        function addTooltip(element, text) {
            element.on("mouseover", function(event) {
                const tooltip = d3.select("#tooltip");
                tooltip.style("opacity", 1)
                    .html(text)
                    .style("left", (event.pageX + 10) + "px")
                    .style("top", (event.pageY - 10) + "px");
            })
            .on("mouseout", function() {
                d3.select("#tooltip").style("opacity", 0);
            });
        }

        // 1. 量化数据流图
        function drawQuantizationDataFlow() {
            const svg = d3.select("#quantization-dataflow");
            createArrowMarkers(svg);

            const nodes = [
                // 输入层
                {id: 'input_tensor', name: '输入张量', x: 100, y: 100, type: 'input',
                 desc: '原始的32位浮点张量数据'},
                {id: 'calibration_data', name: '校准数据集', x: 100, y: 200, type: 'input',
                 desc: '用于统计信息收集的代表性数据'},
                
                // 处理层
                {id: 'connected_graph', name: '连接图分析', x: 300, y: 150, type: 'process',
                 desc: '分析模型结构，建立计算图'},
                {id: 'quantization_wrapper', name: '量化包装器', x: 500, y: 100, type: 'process',
                 desc: '封装原始模块，添加量化功能'},
                {id: 'tensor_quantizer', name: '张量量化器', x: 700, y: 100, type: 'process',
                 desc: '执行具体的量化和反量化操作'},
                {id: 'encoding_analyzer', name: '编码分析器', x: 500, y: 200, type: 'process',
                 desc: '收集统计信息，计算量化参数'},
                {id: 'stats_collector', name: '统计收集器', x: 700, y: 200, type: 'process',
                 desc: '收集张量的最小值、最大值等统计信息'},
                {id: 'encoding_computer', name: '编码计算器', x: 900, y: 200, type: 'process',
                 desc: '根据统计信息计算scale和offset'},
                
                // 存储层
                {id: 'encoding_cache', name: '编码缓存', x: 900, y: 350, type: 'storage',
                 desc: '缓存计算好的量化编码参数'},
                {id: 'model_state', name: '模型状态', x: 700, y: 350, type: 'storage',
                 desc: '保存量化模型的状态信息'},
                
                // 输出层
                {id: 'quantized_tensor', name: '量化张量', x: 1000, y: 100, type: 'output',
                 desc: '量化后的8位整数张量'},
                {id: 'quantized_model', name: '量化模型', x: 500, y: 450, type: 'output',
                 desc: '完整的量化仿真模型'},
                {id: 'exported_model', name: '导出模型', x: 300, y: 450, type: 'output',
                 desc: 'ONNX或其他格式的部署模型'}
            ];

            const flows = [
                {from: 'input_tensor', to: 'connected_graph', type: 'primary', label: '模型分析'},
                {from: 'calibration_data', to: 'connected_graph', type: 'secondary', label: '结构分析'},
                {from: 'connected_graph', to: 'quantization_wrapper', type: 'primary', label: '创建包装器'},
                {from: 'quantization_wrapper', to: 'tensor_quantizer', type: 'primary', label: '量化处理'},
                {from: 'calibration_data', to: 'encoding_analyzer', type: 'secondary', label: '统计收集'},
                {from: 'encoding_analyzer', to: 'stats_collector', type: 'primary', label: '数据传递'},
                {from: 'stats_collector', to: 'encoding_computer', type: 'primary', label: '统计信息'},
                {from: 'encoding_computer', to: 'encoding_cache', type: 'secondary', label: '缓存编码'},
                {from: 'encoding_computer', to: 'tensor_quantizer', type: 'control', label: '设置参数'},
                {from: 'tensor_quantizer', to: 'quantized_tensor', type: 'primary', label: '量化输出'},
                {from: 'tensor_quantizer', to: 'model_state', type: 'secondary', label: '状态更新'},
                {from: 'quantization_wrapper', to: 'quantized_model', type: 'primary', label: '模型构建'},
                {from: 'quantized_model', to: 'exported_model', type: 'primary', label: '模型导出'}
            ];

            // 绘制数据流连接
            flows.forEach(flow => {
                const fromNode = nodes.find(n => n.id === flow.from);
                const toNode = nodes.find(n => n.id === flow.to);
                
                // 创建弯曲路径
                const dx = toNode.x - fromNode.x;
                const dy = toNode.y - fromNode.y;
                const dr = Math.sqrt(dx * dx + dy * dy) * 0.3;
                
                const path = `M ${fromNode.x + 40} ${fromNode.y} A ${dr} ${dr} 0 0 1 ${toNode.x - 40} ${toNode.y}`;
                
                const flowLine = svg.append("path")
                    .attr("class", `data-flow ${flow.type}-flow animated-flow`)
                    .attr("d", path)
                    .style("stroke-dasharray", "10,5")
                    .call(addTooltip, `<strong>${flow.label}</strong><br/>从 ${fromNode.name} 到 ${toNode.name}<br/>数据流类型: ${flow.type}`);

                // 添加流标签
                const midX = (fromNode.x + toNode.x) / 2;
                const midY = (fromNode.y + toNode.y) / 2 - 10;
                svg.append("text")
                    .attr("class", "flow-label")
                    .attr("x", midX)
                    .attr("y", midY)
                    .text(flow.label);
            });

            // 绘制节点
            nodes.forEach(node => {
                const g = svg.append("g")
                    .attr("class", "data-node")
                    .call(addTooltip, `<strong>${node.name}</strong><br/>${node.desc}<br/>类型: ${node.type}`);

                // 节点形状
                if (node.type === 'storage') {
                    // 圆柱形存储
                    g.append("ellipse")
                        .attr("cx", node.x)
                        .attr("cy", node.y - 15)
                        .attr("rx", 40)
                        .attr("ry", 10)
                        .attr("class", `${node.type}-node`);
                    
                    g.append("rect")
                        .attr("x", node.x - 40)
                        .attr("y", node.y - 15)
                        .attr("width", 80)
                        .attr("height", 30)
                        .attr("class", `${node.type}-node`);
                    
                    g.append("ellipse")
                        .attr("cx", node.x)
                        .attr("cy", node.y + 15)
                        .attr("rx", 40)
                        .attr("ry", 10)
                        .attr("class", `${node.type}-node`);
                } else if (node.type === 'input' || node.type === 'output') {
                    // 圆形输入/输出
                    g.append("circle")
                        .attr("cx", node.x)
                        .attr("cy", node.y)
                        .attr("r", 40)
                        .attr("class", `${node.type}-node`);
                } else {
                    // 矩形处理节点
                    g.append("rect")
                        .attr("x", node.x - 40)
                        .attr("y", node.y - 20)
                        .attr("width", 80)
                        .attr("height", 40)
                        .attr("class", `${node.type}-node`)
                        .attr("rx", 8);
                }

                // 节点标签
                g.append("text")
                    .attr("class", "node-label")
                    .attr("x", node.x)
                    .attr("y", node.y)
                    .text(node.name)
                    .style("font-size", "10px");
            });
        }

        // 2. 编码计算数据流
        function drawEncodingDataFlow() {
            const svg = d3.select("#encoding-dataflow");
            createArrowMarkers(svg);

            const encodingNodes = [
                {name: '原始张量', x: 100, y: 150, type: 'input'},
                {name: '统计收集', x: 250, y: 150, type: 'process'},
                {name: '直方图', x: 400, y: 100, type: 'storage'},
                {name: '最小最大值', x: 400, y: 200, type: 'storage'},
                {name: '编码算法选择', x: 550, y: 150, type: 'process'},
                {name: 'MinMax计算', x: 700, y: 100, type: 'process'},
                {name: 'TF-Enhanced计算', x: 700, y: 150, type: 'process'},
                {name: 'Percentile计算', x: 700, y: 200, type: 'process'},
                {name: '编码参数', x: 850, y: 150, type: 'output'}
            ];

            const encodingFlows = [
                {from: 0, to: 1, type: 'primary'},
                {from: 1, to: 2, type: 'secondary'},
                {from: 1, to: 3, type: 'secondary'},
                {from: 2, to: 4, type: 'control'},
                {from: 3, to: 4, type: 'control'},
                {from: 4, to: 5, type: 'primary'},
                {from: 4, to: 6, type: 'primary'},
                {from: 4, to: 7, type: 'primary'},
                {from: 5, to: 8, type: 'primary'},
                {from: 6, to: 8, type: 'primary'},
                {from: 7, to: 8, type: 'primary'}
            ];

            // 绘制连接
            encodingFlows.forEach(flow => {
                const from = encodingNodes[flow.from];
                const to = encodingNodes[flow.to];
                
                svg.append("line")
                    .attr("class", `data-flow ${flow.type}-flow`)
                    .attr("x1", from.x + 30)
                    .attr("y1", from.y)
                    .attr("x2", to.x - 30)
                    .attr("y2", to.y);
            });

            // 绘制节点
            encodingNodes.forEach(node => {
                const g = svg.append("g").attr("class", "data-node");

                g.append("rect")
                    .attr("x", node.x - 30)
                    .attr("y", node.y - 15)
                    .attr("width", 60)
                    .attr("height", 30)
                    .attr("class", `${node.type}-node`)
                    .attr("rx", 5);

                g.append("text")
                    .attr("class", "node-label")
                    .attr("x", node.x)
                    .attr("y", node.y)
                    .style("font-size", "9px")
                    .text(node.name);
            });
        }

        // 3. 模块间数据传递
        function drawModuleDataFlow() {
            const svg = d3.select("#module-dataflow");
            createArrowMarkers(svg);

            const modules = [
                {name: 'User Interface', x: 100, y: 100, type: 'input', 
                 desc: '用户接口，接收用户指令'},
                {name: 'QuantizationSimModel', x: 300, y: 100, type: 'control',
                 desc: '主控制器，协调整个量化过程'},
                {name: 'ConnectedGraph', x: 500, y: 50, type: 'process',
                 desc: '模型结构分析器'},
                {name: 'QuantSimConfig', x: 500, y: 150, type: 'process',
                 desc: '配置管理器'},
                {name: 'QuantizationWrapper', x: 700, y: 100, type: 'process',
                 desc: '量化包装器'},
                {name: 'TensorQuantizer', x: 900, y: 50, type: 'process',
                 desc: '张量量化器'},
                {name: 'EncodingAnalyzer', x: 900, y: 150, type: 'process',
                 desc: '编码分析器'},
                {name: 'Cache System', x: 300, y: 250, type: 'storage',
                 desc: '缓存系统'},
                {name: 'Quantized Model', x: 700, y: 250, type: 'output',
                 desc: '量化后的模型'},
                {name: 'Export System', x: 500, y: 350, type: 'process',
                 desc: '模型导出系统'},
                {name: 'Deployment Package', x: 300, y: 450, type: 'output',
                 desc: '部署包'}
            ];

            const dataFlows = [
                {from: 0, to: 1, data: 'User Commands', type: 'control'},
                {from: 1, to: 2, data: 'Model Structure', type: 'primary'},
                {from: 1, to: 3, data: 'Config Request', type: 'secondary'},
                {from: 1, to: 4, data: 'Wrapper Creation', type: 'primary'},
                {from: 4, to: 5, data: 'Tensor Data', type: 'primary'},
                {from: 4, to: 6, data: 'Statistics', type: 'secondary'},
                {from: 6, to: 5, data: 'Encoding Params', type: 'control'},
                {from: 1, to: 7, data: 'Cache Operations', type: 'secondary'},
                {from: 4, to: 8, data: 'Quantized Output', type: 'primary'},
                {from: 8, to: 9, data: 'Model Export', type: 'primary'},
                {from: 9, to: 10, data: 'Deployment Files', type: 'primary'}
            ];

            // 绘制数据流
            dataFlows.forEach(flow => {
                const from = modules[flow.from];
                const to = modules[flow.to];
                
                // 计算控制点用于贝塞尔曲线
                const dx = to.x - from.x;
                const dy = to.y - from.y;
                const controlX = from.x + dx * 0.5;
                const controlY = from.y + dy * 0.3;
                
                const path = `M ${from.x + 30} ${from.y} Q ${controlX} ${controlY} ${to.x - 30} ${to.y}`;
                
                svg.append("path")
                    .attr("class", `data-flow ${flow.type}-flow`)
                    .attr("d", path)
                    .call(addTooltip, `<strong>数据流: ${flow.data}</strong><br/>从 ${from.name} 到 ${to.name}<br/>类型: ${flow.type}`);

                // 数据标签
                svg.append("text")
                    .attr("class", "flow-label")
                    .attr("x", controlX)
                    .attr("y", controlY - 10)
                    .text(flow.data)
                    .style("font-size", "9px");
            });

            // 绘制模块
            modules.forEach(module => {
                const g = svg.append("g")
                    .attr("class", "data-node")
                    .call(addTooltip, `<strong>${module.name}</strong><br/>${module.desc}`);

                if (module.type === 'storage') {
                    // 数据库图标
                    g.append("rect")
                        .attr("x", module.x - 35)
                        .attr("y", module.y - 15)
                        .attr("width", 70)
                        .attr("height", 30)
                        .attr("class", `${module.type}-node`)
                        .attr("rx", 15);
                } else if (module.type === 'control') {
                    // 六边形控制节点
                    const points = [
                        [module.x - 40, module.y],
                        [module.x - 20, module.y - 20],
                        [module.x + 20, module.y - 20],
                        [module.x + 40, module.y],
                        [module.x + 20, module.y + 20],
                        [module.x - 20, module.y + 20]
                    ];
                    g.append("polygon")
                        .attr("points", points.map(p => p.join(",")).join(" "))
                        .attr("class", `${module.type}-node`);
                } else {
                    // 标准矩形
                    g.append("rect")
                        .attr("x", module.x - 35)
                        .attr("y", module.y - 15)
                        .attr("width", 70)
                        .attr("height", 30)
                        .attr("class", `${module.type}-node`)
                        .attr("rx", 8);
                }

                g.append("text")
                    .attr("class", "node-label")
                    .attr("x", module.x)
                    .attr("y", module.y)
                    .style("font-size", "9px")
                    .text(module.name);
            });
        }

        // 控制函数
        function animateDataFlow() {
            d3.selectAll(".data-flow")
                .style("stroke-dasharray", "10,5")
                .style("animation", "flowAnimation 2s infinite linear");
        }

        function highlightCriticalPath() {
            // 高亮关键路径
            d3.selectAll(".primary-flow")
                .style("stroke-width", "5")
                .style("stroke", "#e74c3c")
                .transition()
                .duration(2000)
                .style("stroke-width", "3")
                .style("stroke", "#e74c3c");
        }

        function showStatistics() {
            alert("📊 数据流统计:\n\n" +
                  "• 总节点数: 24个\n" +
                  "• 数据流连接: 31条\n" +
                  "• 关键路径长度: 8步\n" +
                  "• 平均处理时间: 2.3秒\n" +
                  "• 内存使用峰值: 256MB");
        }

        function resetVisualization() {
            d3.selectAll(".data-flow")
                .style("stroke-width", "3")
                .style("animation", "none");
        }

        // CSS动画
        const style = document.createElement('style');
        style.textContent = `
            @keyframes flowAnimation {
                0% { stroke-dashoffset: 0; }
                100% { stroke-dashoffset: -20; }
            }
        `;
        document.head.appendChild(style);

        // 初始化图表
        drawQuantizationDataFlow();
        drawEncodingDataFlow();
        drawModuleDataFlow();

        // 自动播放数据流动画
        setTimeout(animateDataFlow, 1000);
    </script>
</body>
