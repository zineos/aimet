<?xml version="1.0" encoding="UTF-8"?>
<svg width="900" height="600" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="abstractGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#9b59b6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8e44ad;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="mainGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e74c3c;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#c0392b;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="baseGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3498db;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2980b9;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="concreteGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2ecc71;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#27ae60;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="componentGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f39c12;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e67e22;stop-opacity:1" />
    </linearGradient>
    
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="2" flood-color="rgba(0,0,0,0.3)"/>
    </filter>
    
    <marker id="inheritanceArrow" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto">
      <polygon points="0 0, 10 5, 0 10" fill="none" stroke="#9b59b6" stroke-width="2"/>
    </marker>
    
    <marker id="compositionArrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#e67e22"/>
    </marker>
  </defs>
  
  <!-- 背景 -->
  <rect width="900" height="600" fill="#f8f9fa"/>
  
  <!-- 标题 -->
  <text x="450" y="30" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#2c3e50">
    TensorQuantizer 类层次结构
  </text>
  
  <!-- QuantizerBase (抽象基类) -->
  <g>
    <rect x="370" y="70" width="160" height="60" fill="url(#abstractGradient)" rx="6" filter="url(#shadow)" stroke="#8e44ad" stroke-width="2" stroke-dasharray="5,5"/>
    <text x="450" y="95" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="white" font-style="italic">
      QuantizerBase
    </text>
    <line x1="375" y1="105" x2="525" y2="105" stroke="white" stroke-width="1"/>
    <text x="450" y="120" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="white">
      forward() [abstract]
    </text>
  </g>
  
  <!-- TensorQuantizer (主实现类) -->
  <g>
    <rect x="370" y="180" width="160" height="80" fill="url(#mainGradient)" rx="6" filter="url(#shadow)"/>
    <text x="450" y="205" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="white">
      TensorQuantizer
    </text>
    <line x1="375" y1="215" x2="525" y2="215" stroke="white" stroke-width="1"/>
    <text x="450" y="230" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="white">
      __init__()</text>
    <text x="450" y="245" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="white">
      quantize_dequantize()</text>
    <text x="450" y="260" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="white">
      compute_encoding()</text>
  </g>
  
  <!-- AffineQuantizerBase -->
  <g>
    <rect x="120" y="320" width="160" height="60" fill="url(#baseGradient)" rx="6" filter="url(#shadow)"/>
    <text x="200" y="345" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="white">
      AffineQuantizerBase
    </text>
    <line x1="125" y1="355" x2="275" y2="355" stroke="white" stroke-width="1"/>
    <text x="200" y="370" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="white">
      _quantize_dequantize_int()
    </text>
  </g>
  
  <!-- FloatQuantizerBase -->
  <g>
    <rect x="620" y="320" width="160" height="60" fill="url(#baseGradient)" rx="6" filter="url(#shadow)"/>
    <text x="700" y="345" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="white">
      FloatQuantizerBase
    </text>
    <line x1="625" y1="355" x2="775" y2="355" stroke="white" stroke-width="1"/>
    <text x="700" y="370" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="white">
      _quantize_dequantize_float()
    </text>
  </g>
  
  <!-- QuantizeDequantize -->
  <g>
    <rect x="20" y="450" width="140" height="60" fill="url(#concreteGradient)" rx="6" filter="url(#shadow)"/>
    <text x="90" y="475" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="white">
      QuantizeDequantize
    </text>
    <line x1="25" y1="485" x2="155" y2="485" stroke="white" stroke-width="1"/>
    <text x="90" y="500" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="white">
      forward()
    </text>
  </g>
  
  <!-- MinMaxQuantizer -->
  <g>
    <rect x="220" y="450" width="140" height="60" fill="url(#concreteGradient)" rx="6" filter="url(#shadow)"/>
    <text x="290" y="475" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="white">
      MinMaxQuantizer
    </text>
    <line x1="225" y1="485" x2="355" y2="485" stroke="white" stroke-width="1"/>
    <text x="290" y="500" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="white">
      _compute_minmax()
    </text>
  </g>
  
  <!-- FloatQuantizeDequantize -->
  <g>
    <rect x="540" y="450" width="160" height="60" fill="url(#concreteGradient)" rx="6" filter="url(#shadow)"/>
    <text x="620" y="475" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="white">
      FloatQuantizeDequantize
    </text>
    <line x1="545" y1="485" x2="695" y2="485" stroke="white" stroke-width="1"/>
    <text x="620" y="500" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="white">
      _apply_float_quant()
    </text>
  </g>
  
  <!-- EncodingAnalyzer (组合关系) -->
  <g>
    <rect x="720" y="180" width="140" height="60" fill="url(#componentGradient)" rx="6" filter="url(#shadow)"/>
    <text x="790" y="205" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="white">
      EncodingAnalyzer
    </text>
    <line x1="725" y1="215" x2="855" y2="215" stroke="white" stroke-width="1"/>
    <text x="790" y="230" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="white">
      update_stats()
    </text>
  </g>
  
  <!-- 继承关系线 -->
  <line x1="450" y1="180" x2="450" y2="130" stroke="#9b59b6" stroke-width="2" stroke-dasharray="3,3" marker-end="url(#inheritanceArrow)"/>
  <line x1="200" y1="320" x2="420" y2="260" stroke="#9b59b6" stroke-width="2" stroke-dasharray="3,3" marker-end="url(#inheritanceArrow)"/>
  <line x1="700" y1="320" x2="480" y2="260" stroke="#9b59b6" stroke-width="2" stroke-dasharray="3,3" marker-end="url(#inheritanceArrow)"/>
  <line x1="90" y1="450" x2="170" y2="380" stroke="#9b59b6" stroke-width="2" stroke-dasharray="3,3" marker-end="url(#inheritanceArrow)"/>
  <line x1="290" y1="450" x2="230" y2="380" stroke="#9b59b6" stroke-width="2" stroke-dasharray="3,3" marker-end="url(#inheritanceArrow)"/>
  <line x1="620" y1="450" x2="730" y2="380" stroke="#9b59b6" stroke-width="2" stroke-dasharray="3,3" marker-end="url(#inheritanceArrow)"/>
  
  <!-- 组合关系线 -->
  <line x1="530" y1="220" x2="720" y2="220" stroke="#e67e22" stroke-width="3" marker-end="url(#compositionArrow)"/>
  
  <!-- 图例 -->
  <rect x="50" y="540" width="800" height="50" fill="rgba(236, 240, 241, 0.9)" rx="10"/>
  <text x="70" y="560" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#2c3e50">图例:</text>
  
  <rect x="120" y="550" width="15" height="15" fill="#9b59b6" stroke="#8e44ad" stroke-width="2" stroke-dasharray="2,2"/>
  <text x="145" y="562" font-family="Arial, sans-serif" font-size="12" fill="#2c3e50">抽象类</text>
  
  <rect x="220" y="550" width="15" height="15" fill="#e74c3c"/>
  <text x="245" y="562" font-family="Arial, sans-serif" font-size="12" fill="#2c3e50">主实现类</text>
  
  <rect x="330" y="550" width="15" height="15" fill="#3498db"/>
  <text x="355" y="562" font-family="Arial, sans-serif" font-size="12" fill="#2c3e50">基类</text>
  
  <rect x="410" y="550" width="15" height="15" fill="#2ecc71"/>
  <text x="435" y="562" font-family="Arial, sans-serif" font-size="12" fill="#2c3e50">具体实现</text>
  
  <line x1="520" y1="550" x2="550" y2="550" stroke="#9b59b6" stroke-width="2" stroke-dasharray="3,3" marker-end="url(#inheritanceArrow)"/>
  <text x="560" y="562" font-family="Arial, sans-serif" font-size="12" fill="#2c3e50">继承</text>
  
  <line x1="620" y1="550" x2="650" y2="550" stroke="#e67e22" stroke-width="3" marker-end="url(#compositionArrow)"/>
  <text x="660" y="562" font-family="Arial, sans-serif" font-size="12" fill="#2c3e50">组合</text>
</svg>