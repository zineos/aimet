<?xml version="1.0" encoding="UTF-8"?>
<svg width="900" height="700" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="mainGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e74c3c;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#c0392b;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="coreGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3498db;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2980b9;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="utilityGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2ecc71;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#27ae60;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="2" flood-color="rgba(0,0,0,0.3)"/>
    </filter>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#34495e"/>
    </marker>
  </defs>
  
  <!-- 背景 -->
  <rect width="900" height="700" fill="#f8f9fa"/>
  
  <!-- 标题 -->
  <text x="450" y="30" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#2c3e50">
    AIMET 核心模块依赖关系图
  </text>
  
  <!-- QuantizationSimModel (主控制器) -->
  <rect x="390" y="80" width="120" height="60" fill="url(#mainGradient)" rx="8" filter="url(#shadow)"/>
  <text x="450" y="105" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="white">
    QuantizationSimModel
  </text>
  <text x="450" y="120" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="white">
    主控制器
  </text>
  
  <!-- ConnectedGraph -->
  <rect x="140" y="180" width="120" height="60" fill="url(#coreGradient)" rx="8" filter="url(#shadow)"/>
  <text x="200" y="205" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="white">
    ConnectedGraph
  </text>
  <text x="200" y="220" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="white">
    图分析
  </text>
  
  <!-- QuantSimConfig -->
  <rect x="640" y="180" width="120" height="60" fill="url(#coreGradient)" rx="8" filter="url(#shadow)"/>
  <text x="700" y="205" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="white">
    QuantSimConfig
  </text>
  <text x="700" y="220" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="white">
    配置管理
  </text>
  
  <!-- QuantizationWrapper -->
  <rect x="390" y="280" width="120" height="60" fill="url(#coreGradient)" rx="8" filter="url(#shadow)"/>
  <text x="450" y="305" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="white">
    QuantizationWrapper
  </text>
  <text x="450" y="320" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="white">
    量化包装器
  </text>
  
  <!-- TensorQuantizer -->
  <rect x="140" y="380" width="120" height="60" fill="url(#coreGradient)" rx="8" filter="url(#shadow)"/>
  <text x="200" y="405" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="white">
    TensorQuantizer
  </text>
  <text x="200" y="420" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="white">
    张量量化器
  </text>
  
  <!-- EncodingAnalyzer -->
  <rect x="640" y="380" width="120" height="60" fill="url(#coreGradient)" rx="8" filter="url(#shadow)"/>
  <text x="700" y="405" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="white">
    EncodingAnalyzer
  </text>
  <text x="700" y="420" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="white">
    编码分析器
  </text>
  
  <!-- ModelExporter -->
  <rect x="390" y="480" width="120" height="60" fill="url(#utilityGradient)" rx="8" filter="url(#shadow)"/>
  <text x="450" y="505" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="white">
    ModelExporter
  </text>
  <text x="450" y="520" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="white">
    模型导出
  </text>
  
  <!-- CacheManager -->
  <rect x="90" y="530" width="120" height="60" fill="url(#utilityGradient)" rx="8" filter="url(#shadow)"/>
  <text x="150" y="555" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="white">
    CacheManager
  </text>
  <text x="150" y="570" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="white">
    缓存管理
  </text>
  
  <!-- Visualization -->
  <rect x="690" y="530" width="120" height="60" fill="url(#utilityGradient)" rx="8" filter="url(#shadow)"/>
  <text x="750" y="555" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="white">
    Visualization
  </text>
  <text x="750" y="570" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="white">
    可视化工具
  </text>
  
  <!-- 连接线 -->
  <line x1="450" y1="140" x2="200" y2="180" stroke="#34495e" stroke-width="2" marker-end="url(#arrowhead)"/>
  <line x1="450" y1="140" x2="700" y2="180" stroke="#34495e" stroke-width="2" marker-end="url(#arrowhead)"/>
  <line x1="450" y1="140" x2="450" y2="280" stroke="#34495e" stroke-width="2" marker-end="url(#arrowhead)"/>
  <line x1="450" y1="340" x2="200" y2="380" stroke="#34495e" stroke-width="2" marker-end="url(#arrowhead)"/>
  <line x1="450" y1="340" x2="700" y2="380" stroke="#34495e" stroke-width="2" marker-end="url(#arrowhead)"/>
  <line x1="450" y1="140" x2="450" y2="480" stroke="#34495e" stroke-width="2" marker-end="url(#arrowhead)"/>
  <line x1="450" y1="140" x2="150" y2="530" stroke="#34495e" stroke-width="2" marker-end="url(#arrowhead)"/>
  <line x1="450" y1="140" x2="750" y2="530" stroke="#34495e" stroke-width="2" marker-end="url(#arrowhead)"/>
  
  <!-- 图例 -->
  <rect x="50" y="620" width="800" height="60" fill="rgba(236, 240, 241, 0.9)" rx="10"/>
  <text x="70" y="640" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#2c3e50">图例:</text>
  
  <rect x="120" y="630" width="15" height="15" fill="#e74c3c"/>
  <text x="145" y="642" font-family="Arial, sans-serif" font-size="12" fill="#2c3e50">主控制器</text>
  
  <rect x="220" y="630" width="15" height="15" fill="#3498db"/>
  <text x="245" y="642" font-family="Arial, sans-serif" font-size="12" fill="#2c3e50">核心模块</text>
  
  <rect x="320" y="630" width="15" height="15" fill="#2ecc71"/>
  <text x="345" y="642" font-family="Arial, sans-serif" font-size="12" fill="#2c3e50">工具模块</text>
  
  <line x1="450" y1="630" x2="480" y2="630" stroke="#34495e" stroke-width="2" marker-end="url(#arrowhead)"/>
  <text x="490" y="642" font-family="Arial, sans-serif" font-size="12" fill="#2c3e50">依赖关系</text>
</svg>