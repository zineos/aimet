<?xml version="1.0" encoding="UTF-8"?>
<svg width="800" height="600" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="mainGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e74c3c;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#c0392b;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="nodeGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2ecc71;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#27ae60;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="builderGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3498db;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2980b9;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="analyzerGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#9b59b6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8e44ad;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="utilityGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1abc9c;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#16a085;stop-opacity:1" />
    </linearGradient>
    
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="2" flood-color="rgba(0,0,0,0.3)"/>
    </filter>
    
    <marker id="compositionArrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#e67e22"/>
    </marker>
    
    <marker id="associationArrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#34495e"/>
    </marker>
  </defs>
  
  <!-- 背景 -->
  <rect width="800" height="600" fill="#f8f9fa"/>
  
  <!-- 标题 -->
  <text x="400" y="30" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#2c3e50">
    ConnectedGraph 组件关系图
  </text>
  
  <!-- ConnectedGraph (主类) -->
  <g>
    <rect x="330" y="80" width="140" height="60" fill="url(#mainGradient)" rx="6" filter="url(#shadow)"/>
    <text x="400" y="105" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="white">
      ConnectedGraph
    </text>
    <line x1="335" y1="115" x2="465" y2="115" stroke="white" stroke-width="1"/>
    <text x="400" y="130" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="white">
      get_all_ops()
    </text>
  </g>
  
  <!-- Operation (节点类) -->
  <g>
    <rect x="130" y="220" width="140" height="60" fill="url(#nodeGradient)" rx="6" filter="url(#shadow)"/>
    <text x="200" y="245" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="white">
      Operation
    </text>
    <line x1="135" y1="255" x2="265" y2="255" stroke="white" stroke-width="1"/>
    <text x="200" y="270" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="white">
      add_input()
    </text>
  </g>
  
  <!-- Product (节点类) -->
  <g>
    <rect x="530" y="220" width="140" height="60" fill="url(#nodeGradient)" rx="6" filter="url(#shadow)"/>
    <text x="600" y="245" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="white">
      Product
    </text>
    <line x1="535" y1="255" x2="665" y2="255" stroke="white" stroke-width="1"/>
    <text x="600" y="270" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="white">
      add_consumer()
    </text>
  </g>
  
  <!-- GraphBuilder -->
  <g>
    <rect x="230" y="360" width="140" height="50" fill="url(#builderGradient)" rx="6" filter="url(#shadow)"/>
    <text x="300" y="380" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="white">
      GraphBuilder
    </text>
    <text x="300" y="395" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="white">
      create_operations()
    </text>
  </g>
  
  <!-- DataFlowAnalyzer -->
  <g>
    <rect x="430" y="360" width="140" height="50" fill="url(#analyzerGradient)" rx="6" filter="url(#shadow)"/>
    <text x="500" y="380" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="white">
      DataFlowAnalyzer
    </text>
    <text x="500" y="395" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="white">
      trace_data_flow()
    </text>
  </g>
  
  <!-- TopologicalSorter -->
  <g>
    <rect x="630" y="360" width="140" height="50" fill="url(#utilityGradient)" rx="6" filter="url(#shadow)"/>
    <text x="700" y="380" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="white">
      TopologicalSorter
    </text>
    <text x="700" y="395" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="white">
      sort_ops()
    </text>
  </g>
  
  <!-- OpInformation -->
  <g>
    <rect x="30" y="480" width="120" height="50" fill="url(#utilityGradient)" rx="6" filter="url(#shadow)"/>
    <text x="90" y="500" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="white">
      OpInformation
    </text>
    <text x="90" y="515" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="white">
      get_groups()
    </text>
  </g>
  
  <!-- 组合关系线 -->
  <line x1="400" y1="140" x2="200" y2="220" stroke="#e67e22" stroke-width="3" marker-end="url(#compositionArrow)"/>
  <line x1="400" y1="140" x2="600" y2="220" stroke="#e67e22" stroke-width="3" marker-end="url(#compositionArrow)"/>
  <line x1="400" y1="140" x2="300" y2="360" stroke="#e67e22" stroke-width="3" marker-end="url(#compositionArrow)"/>
  <line x1="400" y1="140" x2="500" y2="360" stroke="#e67e22" stroke-width="3" marker-end="url(#compositionArrow)"/>
  <line x1="400" y1="140" x2="700" y2="360" stroke="#e67e22" stroke-width="3" marker-end="url(#compositionArrow)"/>
  <line x1="200" y1="280" x2="90" y2="480" stroke="#e67e22" stroke-width="2" marker-end="url(#compositionArrow)"/>
  
  <!-- 关联关系线 -->
  <line x1="270" y1="250" x2="530" y2="250" stroke="#34495e" stroke-width="2" marker-end="url(#associationArrow)"/>
  <line x1="530" y1="250" x2="270" y2="250" stroke="#34495e" stroke-width="2" marker-end="url(#associationArrow)"/>
  
  <!-- 图例 -->
  <rect x="50" y="550" width="700" height="40" fill="rgba(236, 240, 241, 0.9)" rx="10"/>
  <text x="70" y="570" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#2c3e50">图例:</text>
  
  <rect x="120" y="560" width="15" height="15" fill="#e74c3c"/>
  <text x="145" y="572" font-family="Arial, sans-serif" font-size="12" fill="#2c3e50">主类</text>
  
  <rect x="200" y="560" width="15" height="15" fill="#2ecc71"/>
  <text x="225" y="572" font-family="Arial, sans-serif" font-size="12" fill="#2c3e50">节点类</text>
  
  <rect x="280" y="560" width="15" height="15" fill="#3498db"/>
  <text x="305" y="572" font-family="Arial, sans-serif" font-size="12" fill="#2c3e50">构建器</text>
  
  <rect x="360" y="560" width="15" height="15" fill="#9b59b6"/>
  <text x="385" y="572" font-family="Arial, sans-serif" font-size="12" fill="#2c3e50">分析器</text>
  
  <rect x="440" y="560" width="15" height="15" fill="#1abc9c"/>
  <text x="465" y="572" font-family="Arial, sans-serif" font-size="12" fill="#2c3e50">工具类</text>
  
  <line x1="520" y1="560" x2="550" y2="560" stroke="#e67e22" stroke-width="3" marker-end="url(#compositionArrow)"/>
  <text x="560" y="572" font-family="Arial, sans-serif" font-size="12" fill="#2c3e50">组合</text>
  
  <line x1="620" y1="560" x2="650" y2="560" stroke="#34495e" stroke-width="2" marker-end="url(#associationArrow)"/>
  <text x="660" y="572" font-family="Arial, sans-serif" font-size="12" fill="#2c3e50">关联</text>
</svg>