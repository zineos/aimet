<?xml version="1.0" encoding="UTF-8"?>
<svg width="1200" height="700" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="2" flood-color="rgba(0,0,0,0.3)"/>
    </filter>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#34495e"/>
    </marker>
  </defs>
  
  <!-- 背景 -->
  <rect width="1200" height="700" fill="#f8f9fa"/>
  
  <!-- 标题 -->
  <text x="600" y="30" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#2c3e50">
    AIMET 模块交互时序图
  </text>
  
  <!-- 参与者 -->
  <g>
    <rect x="60" y="60" width="80" height="40" fill="#3498db" rx="5" filter="url(#shadow)"/>
    <text x="100" y="85" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="white">User</text>
  </g>
  
  <g>
    <rect x="210" y="60" width="100" height="40" fill="#e74c3c" rx="5" filter="url(#shadow)"/>
    <text x="260" y="85" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="white">QuantSim</text>
  </g>
  
  <g>
    <rect x="360" y="60" width="100" height="40" fill="#2ecc71" rx="5" filter="url(#shadow)"/>
    <text x="410" y="85" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="white">Wrapper</text>
  </g>
  
  <g>
    <rect x="510" y="60" width="100" height="40" fill="#f39c12" rx="5" filter="url(#shadow)"/>
    <text x="560" y="85" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="white">Quantizer</text>
  </g>
  
  <g>
    <rect x="660" y="60" width="100" height="40" fill="#9b59b6" rx="5" filter="url(#shadow)"/>
    <text x="710" y="85" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="white">Analyzer</text>
  </g>
  
  <!-- 生命线 -->
  <line x1="100" y1="100" x2="100" y2="650" stroke="#bdc3c7" stroke-width="2" stroke-dasharray="5,5"/>
  <line x1="260" y1="100" x2="260" y2="650" stroke="#bdc3c7" stroke-width="2" stroke-dasharray="5,5"/>
  <line x1="410" y1="100" x2="410" y2="650" stroke="#bdc3c7" stroke-width="2" stroke-dasharray="5,5"/>
  <line x1="560" y1="100" x2="560" y2="650" stroke="#bdc3c7" stroke-width="2" stroke-dasharray="5,5"/>
  <line x1="710" y1="100" x2="710" y2="650" stroke="#bdc3c7" stroke-width="2" stroke-dasharray="5,5"/>
  
  <!-- 消息序列 -->
  <!-- 1. 创建仿真模型 -->
  <line x1="100" y1="130" x2="260" y2="130" stroke="#34495e" stroke-width="2" marker-end="url(#arrowhead)"/>
  <text x="180" y="125" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#2c3e50">
    create_sim(model)
  </text>
  
  <!-- 2. 创建包装器 -->
  <line x1="260" y1="160" x2="410" y2="160" stroke="#34495e" stroke-width="2" marker-end="url(#arrowhead)"/>
  <text x="335" y="155" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#2c3e50">
    create_wrapper()
  </text>
  
  <!-- 3. 创建量化器 -->
  <line x1="410" y1="190" x2="560" y2="190" stroke="#34495e" stroke-width="2" marker-end="url(#arrowhead)"/>
  <text x="485" y="185" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#2c3e50">
    create_quantizer()
  </text>
  
  <!-- 4. 创建分析器 -->
  <line x1="560" y1="220" x2="710" y2="220" stroke="#34495e" stroke-width="2" marker-end="url(#arrowhead)"/>
  <text x="635" y="215" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#2c3e50">
    create_analyzer()
  </text>
  
  <!-- 阶段分割线 -->
  <line x1="50" y1="260" x2="750" y2="260" stroke="#e74c3c" stroke-width="2" stroke-dasharray="10,5"/>
  <text x="400" y="250" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#e74c3c">
    编码计算阶段
  </text>
  
  <!-- 5. 计算编码 -->
  <line x1="100" y1="290" x2="260" y2="290" stroke="#34495e" stroke-width="2" marker-end="url(#arrowhead)"/>
  <text x="180" y="285" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#2c3e50">
    compute_encodings()
  </text>
  
  <!-- 6. 设置统计模式 -->
  <line x1="260" y1="320" x2="410" y2="320" stroke="#34495e" stroke-width="2" marker-end="url(#arrowhead)"/>
  <text x="335" y="315" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#2c3e50">
    set_stats_mode(true)
  </text>
  
  <!-- 7. 启用统计 -->
  <line x1="410" y1="350" x2="560" y2="350" stroke="#34495e" stroke-width="2" marker-end="url(#arrowhead)"/>
  <text x="485" y="345" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#2c3e50">
    enable_stats()
  </text>
  
  <!-- 8. 前向传播 -->
  <line x1="100" y1="380" x2="260" y2="380" stroke="#e74c3c" stroke-width="3" marker-end="url(#arrowhead)"/>
  <text x="180" y="375" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#e74c3c" font-weight="bold">
    forward_pass(data)
  </text>
  
  <!-- 9. 包装器前向 -->
  <line x1="260" y1="410" x2="410" y2="410" stroke="#e74c3c" stroke-width="3" marker-end="url(#arrowhead)"/>
  <text x="335" y="405" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#e74c3c" font-weight="bold">
    forward()
  </text>
  
  <!-- 10. 量化器处理 -->
  <line x1="410" y1="440" x2="560" y2="440" stroke="#e74c3c" stroke-width="3" marker-end="url(#arrowhead)"/>
  <text x="485" y="435" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#e74c3c" font-weight="bold">
    quantize()
  </text>
  
  <!-- 11. 更新统计 -->
  <line x1="560" y1="470" x2="710" y2="470" stroke="#e74c3c" stroke-width="3" marker-end="url(#arrowhead)"/>
  <text x="635" y="465" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#e74c3c" font-weight="bold">
    update_stats()
  </text>
  
  <!-- 阶段分割线 -->
  <line x1="50" y1="510" x2="750" y2="510" stroke="#2ecc71" stroke-width="2" stroke-dasharray="10,5"/>
  <text x="400" y="500" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#2ecc71">
    编码参数计算
  </text>
  
  <!-- 12. 计算编码 -->
  <line x1="260" y1="540" x2="410" y2="540" stroke="#34495e" stroke-width="2" marker-end="url(#arrowhead)"/>
  <text x="335" y="535" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#2c3e50">
    compute_encoding()
  </text>
  
  <!-- 13. 量化器计算编码 -->
  <line x1="410" y1="570" x2="560" y2="570" stroke="#34495e" stroke-width="2" marker-end="url(#arrowhead)"/>
  <text x="485" y="565" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#2c3e50">
    compute_encoding()
  </text>
  
  <!-- 14. 分析器计算 -->
  <line x1="560" y1="600" x2="710" y2="600" stroke="#34495e" stroke-width="2" marker-end="url(#arrowhead)"/>
  <text x="635" y="595" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#2c3e50">
    compute_encoding()
  </text>
  
  <!-- 返回消息 -->
  <line x1="710" y1="620" x2="560" y2="620" stroke="#2ecc71" stroke-width="2" marker-end="url(#arrowhead)"/>
  <text x="635" y="615" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#2ecc71">
    return encoding
  </text>
  
  <line x1="560" y1="640" x2="410" y2="640" stroke="#2ecc71" stroke-width="2" marker-end="url(#arrowhead)"/>
  <text x="485" y="635" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#2ecc71">
    encoding ready
  </text>
  
  <!-- 激活框 -->
  <rect x="95" y="380" width="10" height="90" fill="#3498db" opacity="0.3"/>
  <rect x="255" y="130" width="10" height="520" fill="#e74c3c" opacity="0.3"/>
  <rect x="405" y="160" width="10" height="490" fill="#2ecc71" opacity="0.3"/>
  <rect x="555" y="190" width="10" height="460" fill="#f39c12" opacity="0.3"/>
  <rect x="705" y="220" width="10" height="420" fill="#9b59b6" opacity="0.3"/>
  
  <!-- 注释说明 -->
  <rect x="800" y="120" width="350" height="400" fill="rgba(236, 240, 241, 0.9)" rx="10" stroke="#bdc3c7"/>
  <text x="820" y="145" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#2c3e50">
    🔍 时序图说明
  </text>
  
  <text x="820" y="175" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#e74c3c">
    初始化阶段 (1-4):
  </text>
  <text x="840" y="195" font-family="Arial, sans-serif" font-size="11" fill="#2c3e50">
    • 用户创建QuantizationSimModel
  </text>
  <text x="840" y="210" font-family="Arial, sans-serif" font-size="11" fill="#2c3e50">
    • 系统依次创建各级组件
  </text>
  <text x="840" y="225" font-family="Arial, sans-serif" font-size="11" fill="#2c3e50">
    • 建立组件间的依赖关系
  </text>
  
  <text x="820" y="255" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#e74c3c">
    编码计算阶段 (5-11):
  </text>
  <text x="840" y="275" font-family="Arial, sans-serif" font-size="11" fill="#2c3e50">
    • 用户调用compute_encodings()
  </text>
  <text x="840" y="290" font-family="Arial, sans-serif" font-size="11" fill="#2c3e50">
    • 设置统计收集模式
  </text>
  <text x="840" y="305" font-family="Arial, sans-serif" font-size="11" fill="#2c3e50">
    • 执行前向传播收集统计信息
  </text>
  <text x="840" y="320" font-family="Arial, sans-serif" font-size="11" fill="#2c3e50">
    • 每个张量更新统计信息
  </text>
  
  <text x="820" y="350" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#2ecc71">
    参数计算阶段 (12-15):
  </text>
  <text x="840" y="370" font-family="Arial, sans-serif" font-size="11" fill="#2c3e50">
    • 基于收集的统计信息
  </text>
  <text x="840" y="385" font-family="Arial, sans-serif" font-size="11" fill="#2c3e50">
    • 计算量化编码参数
  </text>
  <text x="840" y="400" font-family="Arial, sans-serif" font-size="11" fill="#2c3e50">
    • 返回scale和offset参数
  </text>
  
  <text x="820" y="430" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#9b59b6">
    关键特点:
  </text>
  <text x="840" y="450" font-family="Arial, sans-serif" font-size="11" fill="#2c3e50">
    • 分层调用: 每层负责特定功能
  </text>
  <text x="840" y="465" font-family="Arial, sans-serif" font-size="11" fill="#2c3e50">
    • 异步处理: 统计收集和编码计算分离
  </text>
  <text x="840" y="480" font-family="Arial, sans-serif" font-size="11" fill="#2c3e50">
    • 状态管理: 每个阶段都有明确状态
  </text>
  <text x="840" y="495" font-family="Arial, sans-serif" font-size="11" fill="#2c3e50">
    • 错误处理: 每层都有异常处理机制
  </text>
</svg>