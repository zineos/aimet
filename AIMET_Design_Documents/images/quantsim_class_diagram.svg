<?xml version="1.0" encoding="UTF-8"?>
<svg width="1000" height="800" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="mainClass" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e74c3c;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#c0392b;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="baseClass" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#9b59b6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8e44ad;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="componentClass" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3498db;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2980b9;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="coreClass" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2ecc71;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#27ae60;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="utilityClass" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f39c12;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e67e22;stop-opacity:1" />
    </linearGradient>
    
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="2" flood-color="rgba(0,0,0,0.3)"/>
    </filter>
    
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#34495e"/>
    </marker>
    
    <marker id="inheritanceArrow" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto">
      <polygon points="0 0, 10 5, 0 10" fill="none" stroke="#9b59b6" stroke-width="2"/>
    </marker>
  </defs>
  
  <!-- 背景 -->
  <rect width="1000" height="800" fill="#f8f9fa"/>
  
  <!-- 标题 -->
  <text x="500" y="30" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#2c3e50">
    QuantizationSimModel 类关系图
  </text>
  
  <!-- QuantizationSimModel (主类) -->
  <g>
    <rect x="430" y="80" width="140" height="80" fill="url(#mainClass)" rx="6" filter="url(#shadow)"/>
    <text x="500" y="105" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="white">
      QuantizationSimModel
    </text>
    <line x1="435" y1="115" x2="565" y2="115" stroke="white" stroke-width="1"/>
    <text x="500" y="130" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="white">
      __init__()
    </text>
    <text x="500" y="145" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="white">
      compute_encodings()
    </text>
    <text x="500" y="160" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="white">
      export()
    </text>
  </g>
  
  <!-- _QuantizationSimModelBase (基类) -->
  <g>
    <rect x="430" y="220" width="140" height="60" fill="url(#baseClass)" rx="6" filter="url(#shadow)" stroke-dasharray="5,5"/>
    <text x="500" y="245" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="white" font-style="italic">
      _QuantizationSimModelBase
    </text>
    <line x1="435" y1="255" x2="565" y2="255" stroke="white" stroke-width="1"/>
    <text x="500" y="270" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="white">
      validate_inputs()
    </text>
  </g>
  
  <!-- ConnectedGraph -->
  <g>
    <rect x="130" y="320" width="140" height="60" fill="url(#componentClass)" rx="6" filter="url(#shadow)"/>
    <text x="200" y="345" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="white">
      ConnectedGraph
    </text>
    <line x1="135" y1="355" x2="265" y2="355" stroke="white" stroke-width="1"/>
    <text x="200" y="370" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="white">
      get_all_ops()
    </text>
  </g>
  
  <!-- QuantSimConfigurator -->
  <g>
    <rect x="730" y="320" width="140" height="60" fill="url(#componentClass)" rx="6" filter="url(#shadow)"/>
    <text x="800" y="345" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="white">
      QuantSimConfigurator
    </text>
    <line x1="735" y1="355" x2="865" y2="355" stroke="white" stroke-width="1"/>
    <text x="800" y="370" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="white">
      load_config()
    </text>
  </g>
  
  <!-- QuantizationWrapper -->
  <g>
    <rect x="280" y="480" width="140" height="60" fill="url(#componentClass)" rx="6" filter="url(#shadow)"/>
    <text x="350" y="505" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="white">
      QuantizationWrapper
    </text>
    <line x1="285" y1="515" x2="415" y2="515" stroke="white" stroke-width="1"/>
    <text x="350" y="530" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="white">
      forward()
    </text>
  </g>
  
  <!-- ModelExporter -->
  <g>
    <rect x="580" y="480" width="140" height="60" fill="url(#componentClass)" rx="6" filter="url(#shadow)"/>
    <text x="650" y="505" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="white">
      ModelExporter
    </text>
    <line x1="585" y1="515" x2="715" y2="515" stroke="white" stroke-width="1"/>
    <text x="650" y="530" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="white">
      export()
    </text>
  </g>
  
  <!-- CacheManager -->
  <g>
    <rect x="130" y="600" width="140" height="60" fill="url(#utilityClass)" rx="6" filter="url(#shadow)"/>
    <text x="200" y="625" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="white">
      CacheManager
    </text>
    <line x1="135" y1="635" x2="265" y2="635" stroke="white" stroke-width="1"/>
    <text x="200" y="650" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="white">
      cache_data()
    </text>
  </g>
  
  <!-- TensorQuantizer -->
  <g>
    <rect x="280" y="600" width="140" height="60" fill="url(#coreClass)" rx="6" filter="url(#shadow)"/>
    <text x="350" y="625" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="white">
      TensorQuantizer
    </text>
    <line x1="285" y1="635" x2="415" y2="635" stroke="white" stroke-width="1"/>
    <text x="350" y="650" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="white">
      quantize_dequantize()
    </text>
  </g>
  
  <!-- EncodingAnalyzer -->
  <g>
    <rect x="430" y="600" width="140" height="60" fill="url(#coreClass)" rx="6" filter="url(#shadow)"/>
    <text x="500" y="625" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="white">
      EncodingAnalyzer
    </text>
    <line x1="435" y1="635" x2="565" y2="635" stroke="white" stroke-width="1"/>
    <text x="500" y="650" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="white">
      compute_encoding()
    </text>
  </g>
  
  <!-- 继承关系线 (虚线箭头) -->
  <line x1="500" y1="220" x2="500" y2="160" stroke="#9b59b6" stroke-width="2" stroke-dasharray="5,5" marker-end="url(#inheritanceArrow)"/>
  
  <!-- 组合关系线 (实线箭头) -->
  <line x1="450" y1="160" x2="200" y2="320" stroke="#e67e22" stroke-width="3" marker-end="url(#arrowhead)"/>
  <line x1="500" y1="160" x2="800" y2="320" stroke="#e67e22" stroke-width="3" marker-end="url(#arrowhead)"/>
  <line x1="500" y1="160" x2="350" y2="480" stroke="#e67e22" stroke-width="3" marker-end="url(#arrowhead)"/>
  <line x1="520" y1="160" x2="650" y2="480" stroke="#e67e22" stroke-width="3" marker-end="url(#arrowhead)"/>
  <line x1="480" y1="160" x2="200" y2="600" stroke="#e67e22" stroke-width="3" marker-end="url(#arrowhead)"/>
  <line x1="350" y1="540" x2="350" y2="600" stroke="#e67e22" stroke-width="3" marker-end="url(#arrowhead)"/>
  <line x1="350" y1="540" x2="500" y2="600" stroke="#e67e22" stroke-width="3" marker-end="url(#arrowhead)"/>
  
  <!-- 图例 -->
  <rect x="50" y="720" width="900" height="60" fill="rgba(236, 240, 241, 0.9)" rx="10"/>
  <text x="70" y="740" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#2c3e50">图例:</text>
  
  <rect x="120" y="730" width="15" height="15" fill="#e74c3c"/>
  <text x="145" y="742" font-family="Arial, sans-serif" font-size="12" fill="#2c3e50">主类</text>
  
  <rect x="200" y="730" width="15" height="15" fill="#9b59b6" stroke-dasharray="2,2"/>
  <text x="225" y="742" font-family="Arial, sans-serif" font-size="12" fill="#2c3e50">抽象基类</text>
  
  <rect x="300" y="730" width="15" height="15" fill="#3498db"/>
  <text x="325" y="742" font-family="Arial, sans-serif" font-size="12" fill="#2c3e50">组件类</text>
  
  <line x1="400" y1="730" x2="430" y2="730" stroke="#9b59b6" stroke-width="2" stroke-dasharray="3,3" marker-end="url(#inheritanceArrow)"/>
  <text x="440" y="742" font-family="Arial, sans-serif" font-size="12" fill="#2c3e50">继承关系</text>
  
  <line x1="550" y1="730" x2="580" y2="730" stroke="#e67e22" stroke-width="3" marker-end="url(#arrowhead)"/>
  <text x="590" y="742" font-family="Arial, sans-serif" font-size="12" fill="#2c3e50">组合关系</text>
  
  <!-- 说明文字 -->
  <text x="70" y="765" font-family="Arial, sans-serif" font-size="11" fill="#7f8c8d">
    QuantizationSimModel作为主控制器，通过组合模式管理各个功能组件，通过继承获得基础功能
  </text>
</svg>